<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- PWA: скрывает адресную строку при запуске с экрана -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="doc2pdf">

<!-- Окрашивает верхнюю строку статуса (часы/сигнал) -->
<!-- Для PWA должен совпадать с theme_color в manifest.json -->
<meta name="theme-color" content="#0d0f14">

<!-- Подключение манифеста и иконки -->
<link rel="manifest" href="/icons/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="icon" href="/icons/favicon.ico" sizes="32x32">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* === ИСПРАВЛЕНИЕ: явно указываем тёмную схему === */
      /* Это заставляет Android перекрасить нижнюю навигационную панель в тёмный цвет */
      color-scheme: dark;
      
      --bg: #0d0f14;
      --surface: #161a24;
      --surface2: #1e2433;
      --border: #2a3148;
      --accent: #4f8ef7;
      --accent2: #7c5ef7;
      --success: #34d399;
      --error: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 16px;
    }

    html {
      background: var(--bg);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(24px + env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(79,142,247,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 90%, rgba(124,94,247,.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 16px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 24px rgba(79,142,247,.35);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--muted);
      font-size: 15px;
    }

    .counter-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .counter-bar-bg {
      width: 120px;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .counter-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease, background .4s ease;
      width: 0%;
    }

    .counter-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .counter-label strong {
      color: var(--text);
      font-weight: 600;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
      background: var(--surface2);
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(79,142,247,.06);
    }

    .dropzone.drag-over { transform: scale(1.01); }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .dz-icon { font-size: 48px; margin-bottom: 12px; display: block; line-height: 1; }
    .dz-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .dz-sub { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .dz-sub span { color: var(--accent); font-weight: 500; }

    .file-preview {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 16px;
    }
    .file-preview.visible { display: flex; }

    .file-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .file-remove {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 20px; padding: 4px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .file-remove:hover { color: var(--error); background: rgba(248,113,113,.1); }

    .btn-convert {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(79,142,247,.3);
      letter-spacing: 0.2px;
    }

    .btn-convert:hover:not(:disabled) {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(79,142,247,.4);
    }
    .btn-convert:active:not(:disabled) { transform: translateY(0); }
    .btn-convert:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .progress-wrap { display: none; margin-top: 20px; }
    .progress-wrap.visible { display: block; }

    .progress-label {
      font-size: 13px; color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .4s ease;
      width: 0%;
    }

    .progress-fill.indeterminate {
      width: 45% !important;
      animation: indeterminate 1.4s ease infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    .alert {
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 16px;
    }
    .alert.visible { display: flex; }
    .alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .alert.success { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.25); color: #34d399; }
    .alert.error   { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25); color: #f87171; }

    footer {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .spinner.visible { display: block; }

    @media (max-width: 540px) {
      .card { padding: 20px 16px; }
      .dropzone { padding: 36px 16px; }
      .btn-convert { font-size: 15px; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">📄</div>
        <span class="logo-text">DocToPDF</span>
      </div>
      <p>Конвертация Word документов в PDF</p>

      <div class="counter-wrap">
        <div class="counter-bar-bg">
          <div class="counter-bar-fill" id="counterFill"></div>
        </div>
        <span class="counter-label">Осталось сегодня: <strong id="counterNum">…</strong> из 10</span>
      </div>
    </header>

    <div class="card">
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".doc,.docx,.odt,.rtf" />
        <span class="dz-icon">⬆️</span>
        <div class="dz-title">Перетащите файл или нажмите для выбора</div>
        <div class="dz-sub">
          <span>.doc, .docx, .odt, .rtf</span> · до 50 МБ
        </div>
      </div>

      <div class="file-preview" id="filePreview">
        <div class="file-icon">📝</div>
        <div class="file-info">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="file-remove" id="removeFile" title="Убрать файл">✕</button>
      </div>

      <button class="btn-convert" id="convertBtn" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Выберите файл для конвертации</span>
      </button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">Конвертация...</div>
        <div class="progress-bar">
          <div class="progress-fill indeterminate" id="progressFill"></div>
        </div>
      </div>

      <div class="alert" id="alertBox">
        <span class="alert-icon" id="alertIcon"></span>
        <span id="alertText"></span>
      </div>
    </div>

    <footer>Конвертация через CloudConvert · LibreOffice engine</footer>
  </div>

  <script>
    const counterNum  = document.getElementById('counterNum');
    const counterFill = document.getElementById('counterFill');

    async function fetchBalance() {
      try {
        const res = await fetch('/api/balance');
        const data = await res.json();
        if (data.credits != null) renderCounter(data.credits);
        else counterNum.textContent = '?';
      } catch {
        counterNum.textContent = '?';
      }
    }

    function renderCounter(credits) {
      const n = Math.max(0, credits);
      counterNum.textContent = n;
      const pct = Math.min(100, (n / 10) * 100);
      counterFill.style.width = pct + '%';
      counterFill.style.background = n > 3
        ? 'linear-gradient(90deg, #4f8ef7, #7c5ef7)'
        : n > 0
          ? 'linear-gradient(90deg, #f59e0b, #ef4444)'
          : '#ef4444';
    }

    fetchBalance();

    // --- UI ---
    const dropzone      = document.getElementById('dropzone');
    const fileInput     = document.getElementById('fileInput');
    const filePreview   = document.getElementById('filePreview');
    const fileName      = document.getElementById('fileName');
    const fileSize      = document.getElementById('fileSize');
    const removeFile    = document.getElementById('removeFile');
    const convertBtn    = document.getElementById('convertBtn');
    const btnText       = document.getElementById('btnText');
    const spinner       = document.getElementById('spinner');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const alertBox      = document.getElementById('alertBox');
    const alertIcon     = document.getElementById('alertIcon');
    const alertText     = document.getElementById('alertText');

    let selectedFile = null;

    function formatBytes(b) {
      if (b < 1024) return b + ' Б';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' КБ';
      return (b / 1048576).toFixed(2) + ' МБ';
    }

    function showAlert(type, msg) {
      alertBox.className = 'alert visible ' + type;
      alertIcon.textContent = type === 'success' ? '✅' : '❌';
      alertText.textContent = msg;
    }

    function hideAlert() { alertBox.className = 'alert'; }

    function setFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['doc','docx','odt','rtf'].includes(ext)) {
        showAlert('error', 'Поддерживаются только .doc, .docx, .odt, .rtf');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showAlert('error', 'Файл слишком большой. Максимум — 50 МБ.');
        return;
      }
      selectedFile = file;
      hideAlert();
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      filePreview.classList.add('visible');
      convertBtn.disabled = false;
      btnText.textContent = 'Конвертировать в PDF';
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      filePreview.classList.remove('visible');
      convertBtn.disabled = true;
      btnText.textContent = 'Выберите файл для конвертации';
      progressWrap.classList.remove('visible');
      hideAlert();
    }

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
    removeFile.addEventListener('click', clearFile);

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      convertBtn.disabled = true;
      spinner.classList.add('visible');
      btnText.textContent = 'Конвертация...';
      progressWrap.classList.add('visible');
      progressFill.className = 'progress-fill indeterminate';
      progressLabel.textContent = 'Загрузка и конвертация через CloudConvert...';
      hideAlert();

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/api/convert', { method: 'POST', body: formData });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || `Ошибка сервера: ${res.status}`);
        }

        progressLabel.textContent = 'Скачивание PDF...';
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const pdfName = selectedFile.name.replace(/\.[^.]+$/, '') + '.pdf';
        a.href = url;
        a.download = pdfName;
        a.click();
        URL.revokeObjectURL(url);

        progressFill.className = 'progress-fill';
        progressFill.style.width = '100%';
        progressLabel.textContent = 'Готово!';
        showAlert('success', `✓ Файл "${pdfName}" успешно конвертирован и загружен.`);

        // Refresh real balance from CloudConvert
        fetchBalance();

      } catch (err) {
        showAlert('error', err.message || 'Произошла ошибка при конвертации');
        progressWrap.classList.remove('visible');
      } finally {
        convertBtn.disabled = false;
        spinner.classList.remove('visible');
        btnText.textContent = 'Конвертировать ещё раз';
      }
    });
  </script>
  <script>

// ── 1. Динамический theme-color (верх / низ телефона) ──
function setThemeColor(color) {
  const meta = document.getElementById('themeColorMeta');
  if (meta) meta.setAttribute('content', color);
}

// Реагируем на системную смену день ↔ ночь
const darkMQ = window.matchMedia('(prefers-color-scheme: dark)');
darkMQ.addEventListener('change', e => {
  setThemeColor('#0d0f14');
});
setThemeColor('#0d0f14');

// Если у тебя есть своя кнопка темы — вызывай вручную:
// setThemeColor('#0d0f14');  // тёмная
// setThemeColor('#ffffff'); // светлая


// ── 2. Баннер установки (Android + iOS — один баннер для всех) ──

// Не показывать если уже закрыли менее 7 дней назад
const _dismissed = localStorage.getItem('pwa-install-dismissed');
if (_dismissed && Date.now() - parseInt(_dismissed) < 7 * 24 * 60 * 60 * 1000) {
  // тихо пропускаем
} else {

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  let deferredPrompt = null;

  if (!isInStandalone) {

    // Создаём один баннер
    function createBanner(btnLabel, onBtnClick) {
      const b = document.createElement('div');
      b.id = 'pwa-install-banner';
      b.style.cssText = 'position:fixed;bottom:20px;left:12px;right:12px;'
        + 'background:#0a0a0f;color:#fff;border-radius:18px;'
        + 'padding:14px 16px;display:flex;align-items:center;gap:12px;'
        + 'box-shadow:0 8px 32px rgba(0,0,0,.45);z-index:9000;'
        + 'font-family:sans-serif;animation:pwaSlideUp .4s cubic-bezier(.32,1,.23,1);';
      b.innerHTML = `
        <span style="font-size:28px;flex-shrink:0">📲</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600">doc2pdf</div>
          <div style="font-size:12px;opacity:.7;margin-top:2px">Добавить на экран</div>
        </div>
        <button id="pwa-action-btn" style="flex-shrink:0;padding:8px 16px;background:#fff;
          color:#0a0a0f;border:none;border-radius:12px;font-size:13px;
          font-weight:700;cursor:pointer">${btnLabel}</button>
        <button id="pwa-close-btn" style="flex-shrink:0;background:none;border:none;
          color:#fff;font-size:18px;cursor:pointer;opacity:.65;padding:2px 4px">✕</button>
      `;
      // Добавляем анимацию
      if (!document.getElementById('pwa-style')) {
        const s = document.createElement('style');
        s.id = 'pwa-style';
        s.textContent = '@keyframes pwaSlideUp{from{transform:translateY(120%);opacity:0}to{transform:translateY(0);opacity:1}}';
        document.head.appendChild(s);
      }
      document.body.appendChild(b);
      document.getElementById('pwa-action-btn').onclick = onBtnClick;
      document.getElementById('pwa-close-btn').onclick = () => {
        b.remove();
        localStorage.setItem('pwa-install-dismissed', Date.now());
      };
    }

    if (isIOS) {
      // iOS Safari — показать баннер с кнопкой «Как?»
      const isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
      if (isSafari) {
        setTimeout(() => {
          createBanner('Как?', () => showIOSGuide());
        }, 2000);
      }
    } else {
      // Android/Desktop — ждём beforeinstallprompt
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => {
          createBanner('Установить', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('pwa-install-banner')?.remove();
          });
        }, 1500);
      });
      window.addEventListener('appinstalled', () => {
        document.getElementById('pwa-install-banner')?.remove();
      });
    }
  }
}

// ── 3. Модальное окно с инструкцией для iOS ──
function showIOSGuide() {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999;'
    + 'background:rgba(0,0,0,.8);display:flex;align-items:flex-end;padding:12px;';
  ov.innerHTML = `
    <div style="background:#1c1c1e;border-radius:22px;padding:24px;width:100%;
      border:1px solid rgba(255,255,255,.12)">
      <div style="font-size:17px;font-weight:700;margin-bottom:20px;
        text-align:center;color:#fff">Установка на iPhone</div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:36px;height:36px;background:#0a0a0f;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:16px;font-weight:700;color:#fff;flex-shrink:0">1</div>
          <div style="font-size:14px;color:rgba(255,255,255,.75);line-height:1.4">
            Нажми кнопку <strong style="color:#fff">«Поделиться»</strong>
            <span style="font-size:18px"> ⎙ </span> внизу Safari
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:36px;height:36px;background:#0a0a0f;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:16px;font-weight:700;color:#fff;flex-shrink:0">2</div>
          <div style="font-size:14px;color:rgba(255,255,255,.75);line-height:1.4">
            Выбери <strong style="color:#fff">«На экран «Домой»»</strong>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:36px;height:36px;background:#0a0a0f;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:16px;font-weight:700;color:#fff;flex-shrink:0">3</div>
          <div style="font-size:14px;color:rgba(255,255,255,.75);line-height:1.4">
            Нажми <strong style="color:#fff">«Добавить»</strong>
          </div>
        </div>
      </div>
      <button onclick="this.closest('[style*=inset]').remove()"
        style="width:100%;margin-top:22px;padding:14px;background:#0a0a0f;
        color:#fff;border:none;border-radius:14px;font-size:15px;
        font-weight:600;font-family:sans-serif;cursor:pointer">Понятно</button>
    </div>
  `;
  document.body.appendChild(ov);
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
}

</script>

</body>
</html>
